<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Pernikahan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Nama tamu di luar -->
<div class="guest-container">
  <p>Kepada Yth.</p>
  <h2 id="guestName">Tamu Undangan</h2>
</div>

<!-- Amplop -->
<div class="envelope" id="envelope" onclick="openInvitation()">
  <div class="flap"></div>
  <div class="letter">
    <p class="click-text">Klik untuk membuka undangan</p>
  </div>
</div>

<!-- Konten -->
<div class="content" id="content">
  <h1 class="fade">Rina & Budi</h1>
  <p class="fade">Akan melangsungkan pernikahan pada:</p>

  <h3 class="fade">Minggu, 10 Oktober 2026</h3>
  <p class="fade">Gedung Serbaguna</p>

  <div id="countdown" class="fade"></div>

  <p class="fade">Merupakan suatu kehormatan bagi kami apabila Anda berkenan hadir.</p>
</div>

<!-- Hujan bunga -->
<div id="petals"></div>

<script src="script.js"></script>
</body>
</html>
